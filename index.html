<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Photo Reference Board</title>
    <style>
        :root {
            --bg: #f6f3ef;
            --paper: #ffffff;
            --ink: #222222;
            --muted: #7a7a7a;
            --line: #e6dfd8;
            --accent: #b6937a;
            --accent-soft: #efe6df;
            --shadow: 0 18px 40px rgba(35, 25, 20, 0.08);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 34%),
                linear-gradient(180deg, #fbf8f4 0%, #f2ede8 100%);
        }

        .wrap {
            width: min(1280px, calc(100% - 48px));
            margin: 48px auto 72px;
        }

        .hero {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-xl);
            padding: 40px 42px;
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #7f5f4a;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 10px;
            font-size: clamp(32px, 4vw, 52px);
            line-height: 1.08;
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.7;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .toolbar button {
            appearance: none;
            border: none;
            cursor: pointer;
            border-radius: 999px;
            padding: 13px 18px;
            font-size: 14px;
            font-weight: 700;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .toolbar button:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--ink);
            color: white;
            box-shadow: 0 10px 24px rgba(34, 34, 34, 0.12);
        }

        .btn-soft {
            background: white;
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .board {
            display: grid;
            gap: 20px;
        }

        /* Section */
        .section {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            padding: 28px 30px 20px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(249,245,241,0.85) 100%);
        }

        .section-title-wrap h2 {
            margin: 0;
            font-size: 26px;
            letter-spacing: -0.03em;
        }

        .section-title-wrap p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .section-count {
            padding: 9px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #7f5f4a;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* Section Groups Container */
        .section-groups {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
        }

        /* Group Card */
        .group-card {
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, #fffdfa 0%, #faf6f1 100%);
            overflow: hidden;
        }

        .group-head {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.6);
        }

        .group-title-input {
            flex: 1;
            border: none;
            background: transparent;
            font: inherit;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--ink);
            outline: none;
            padding: 4px 0;
            min-width: 0;
        }

        .wrap.editing .group-title-input {
            background: white;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 8px 12px;
        }

        .wrap.editing .group-title-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(182, 147, 122, 0.12);
        }

        .wrap:not(.editing) .group-title-input {
            pointer-events: none;
            cursor: default;
        }

        .group-photo-count {
            padding: 6px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #7f5f4a;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .group-delete-btn {
            appearance: none;
            border: 1px solid rgba(220, 80, 80, 0.2);
            background: rgba(220, 80, 80, 0.06);
            color: #c44;
            border-radius: 999px;
            padding: 6px 14px;
            font: inherit;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.18s ease;
            flex-shrink: 0;
        }

        .group-delete-btn:hover {
            background: rgba(220, 80, 80, 0.14);
        }

        .group-body {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 20px;
        }

        /* Memo */
        .note-card {
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: white;
        }

        .note-card h3 {
            margin: 0 0 10px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .memo {
            width: 100%;
            min-height: 80px;
            resize: vertical;
            border: 1px solid #dfd7cf;
            border-radius: var(--radius-md);
            background: #faf8f5;
            padding: 14px;
            font: inherit;
            font-size: 14px;
            line-height: 1.65;
            color: var(--ink);
            outline: none;
        }

        .memo:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(182, 147, 122, 0.12);
        }

        .wrap:not(.editing) .note-card {
            border-color: transparent;
            background: rgba(247, 243, 238, 0.5);
            padding: 16px;
        }

        .wrap:not(.editing) .memo {
            border: none;
            background: transparent;
            resize: none;
            pointer-events: none;
            min-height: auto;
            padding: 0;
        }

        .wrap:not(.editing) .note-card:has(.memo:placeholder-shown) {
            display: none;
        }

        .wrap:not(.editing) .note-card h3 {
            display: none;
        }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        /* Photo Slot */
        .photo-slot {
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--line);
            isolation: isolate;
        }

        .slot-image-area {
            position: relative;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.98), rgba(247,240,235,0.92)),
                repeating-linear-gradient(
                    -45deg,
                    rgba(182, 147, 122, 0.08) 0,
                    rgba(182, 147, 122, 0.08) 12px,
                    rgba(255, 255, 255, 0.8) 12px,
                    rgba(255, 255, 255, 0.8) 24px
                );
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .photo-slot.has-image .slot-inner {
            display: none;
        }

        .photo-slot input {
            display: none;
        }

        .slot-inner {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: background 0.18s ease;
        }

        .photo-slot:hover .slot-inner {
            background: rgba(255, 255, 255, 0.34);
        }

        .slot-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 10px 20px rgba(52, 34, 19, 0.08);
            font-size: 22px;
        }

        .slot-title {
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.02em;
        }

        .slot-sub {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .slot-preview {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-slot.has-image .slot-preview {
            display: block;
        }

        .slot-overlay {
            position: absolute;
            inset: auto 12px 12px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 14px;
            color: white;
            background: linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.56));
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.18s ease;
        }

        .photo-slot.has-image .slot-overlay {
            opacity: 1;
        }

        .photo-slot:hover .slot-overlay {
            opacity: 1;
        }

        .slot-name {
            font-size: 12px;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .slot-actions {
            display: flex;
            gap: 8px;
        }

        .mini-btn {
            border: none;
            cursor: pointer;
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
        }

        .mini-btn:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        /* Slot Memo */
        .slot-memo {
            display: block;
            width: 100%;
            border: none;
            border-top: 1px solid var(--line);
            padding: 10px 14px;
            font: inherit;
            font-size: 12px;
            line-height: 1.5;
            color: var(--ink);
            background: white;
            resize: none;
            outline: none;
            overflow: hidden;
        }

        .slot-memo:focus {
            background: #fffaf6;
        }

        .slot-memo::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        .wrap:not(.editing) .slot-memo {
            pointer-events: none;
            resize: none;
            background: rgba(247, 243, 238, 0.3);
            font-size: 11px;
            padding: 8px 12px;
        }

        .wrap:not(.editing) .slot-memo:placeholder-shown {
            display: none;
        }

        /* Add Buttons */
        .add-slot-btn {
            aspect-ratio: 4 / 5;
            border-radius: 18px;
            border: 2px dashed var(--line);
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
        }

        .add-slot-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(182, 147, 122, 0.04);
        }

        .add-slot-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: var(--accent-soft);
            font-size: 20px;
            color: var(--accent);
        }

        .add-group-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 24px;
            border: 2px dashed var(--line);
            border-radius: var(--radius-lg);
            background: transparent;
            cursor: pointer;
            font: inherit;
            font-size: 15px;
            font-weight: 700;
            color: var(--muted);
            transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
        }

        .add-group-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(182, 147, 122, 0.04);
        }

        .add-group-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: var(--accent-soft);
            font-size: 18px;
            color: var(--accent);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(16px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            cursor: pointer;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            cursor: default;
        }

        .lightbox-memo {
            max-width: 600px;
            margin: 0;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
            cursor: default;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: background 0.18s ease;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.24);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            width: min(680px, 100%);
            max-height: 80vh;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--line);
        }

        .modal-head h3 {
            margin: 0;
            font-size: 18px;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--accent-soft);
            color: var(--ink);
            font-size: 18px;
            cursor: pointer;
            display: grid;
            place-items: center;
        }

        .modal-close:hover {
            background: #e4d6cb;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .modal-textarea {
            width: 100%;
            min-height: 320px;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 16px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 13px;
            line-height: 1.5;
            color: var(--ink);
            background: #faf8f5;
            resize: vertical;
            outline: none;
        }

        .modal-textarea:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            border-top: 1px solid var(--line);
        }

        .modal-actions .btn-primary {
            border: none;
            cursor: pointer;
            border-radius: 999px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 700;
        }

        /* Edit Mode Visibility */
        .wrap:not(.editing) .photo-slot:not(.has-image) {
            display: none;
        }

        .wrap:not(.editing) .photo-slot .slot-inner {
            display: none;
        }

        .wrap:not(.editing) .photo-slot .slot-overlay {
            display: none;
        }

        .wrap:not(.editing) .add-slot-btn {
            display: none;
        }

        .wrap:not(.editing) .add-group-btn {
            display: none;
        }

        .wrap:not(.editing) .group-delete-btn {
            display: none;
        }

        #editToggleBtn.active {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
            box-shadow: 0 10px 24px rgba(34, 34, 34, 0.12);
        }

        /* Responsive */
        @media (max-width: 1080px) {
            .gallery {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .wrap {
                width: min(100% - 24px, 1280px);
                margin: 18px auto 36px;
            }

            .hero {
                padding: 24px 20px;
            }

            .section-head {
                padding: 22px 20px 16px;
            }

            .section-groups {
                padding: 14px;
            }

            .group-body {
                padding: 14px;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .lightbox, .modal-overlay {
                padding: 16px;
            }
        }

        /* Print */
        @media print {
            body {
                background: white;
            }

            .wrap {
                width: 100%;
                margin: 0;
            }

            .hero, .section {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }

            .toolbar, .mini-btn, .slot-sub, .slot-inner, .slot-overlay,
            .lightbox, .add-slot-btn, .add-group-btn, .group-delete-btn,
            .photo-slot:not(.has-image), .modal-overlay,
            .slot-memo:placeholder-shown {
                display: none !important;
            }

            .wrap:not(.editing) .note-card {
                background: transparent;
            }

            .board {
                gap: 14px;
            }

            .group-card {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="hero">
            <span class="eyebrow">Wedding Reference Board</span>
            <h1>웨딩 촬영 시안</h1>
            <div class="toolbar">
                <button type="button" class="btn-primary" onclick="window.print()">PDF / 인쇄 저장</button>
                <button type="button" class="btn-soft" id="editToggleBtn">편집</button>
                <button type="button" class="btn-soft" id="exportJsonBtn">JSON 내보내기</button>
            </div>
        </section>

        <main class="board" id="board"></main>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" type="button">&times;</button>
        <img class="lightbox-img" id="lightboxImg" alt="" />
        <p class="lightbox-memo" id="lightboxMemo"></p>
    </div>

    <div class="modal-overlay" id="jsonModal">
        <div class="modal">
            <div class="modal-head">
                <h3>data.json 내보내기</h3>
                <button class="modal-close" type="button">&times;</button>
            </div>
            <div class="modal-body">
                <textarea class="modal-textarea" id="jsonOutput" readonly></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" id="copyJsonBtn">클립보드에 복사</button>
            </div>
        </div>
    </div>

    <script>
        let slotCounter = 0;

        const loadData = async () => {
            try {
                const res = await fetch('data.json');
                if (!res.ok) throw new Error();
                return await res.json();
            } catch {
                return {
                    sections: [
                        { key: 'couple', title: '투샷', description: '커플 중심의 메인 구도와 분위기 레퍼런스', groups: [] },
                        { key: 'bride', title: '신부 단독컷', description: '드레스 라인, 시선 처리, 손동작 중심 레퍼런스', groups: [] },
                        { key: 'groom', title: '신랑 단독컷', description: '턱시도 핏, 담백한 포즈, 클래식 무드 중심 레퍼런스', groups: [] }
                    ]
                };
            }
        };

        const updateSectionCount = (sectionEl) => {
            const count = sectionEl.querySelectorAll('.photo-slot.has-image').length;
            sectionEl.querySelector('.section-count').textContent = `${count} Photos`;
        };

        const updateGroupPhotoCount = (groupEl) => {
            const count = groupEl.querySelectorAll('.photo-slot.has-image').length;
            const badge = groupEl.querySelector('.group-photo-count');
            if (badge) badge.textContent = `${count}장`;
        };

        const readFileAsDataUrl = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });

        const applyImageToSlot = async (slot, file) => {
            if (!file || !file.type.startsWith('image/')) return;

            const preview = slot.querySelector('.slot-preview');
            const overlayName = slot.querySelector('.slot-name');
            const dataUrl = await readFileAsDataUrl(file);

            preview.src = dataUrl;
            overlayName.textContent = file.name;
            slot.classList.add('has-image');
            slot.dataset.originalName = file.name;
            slot.dataset.isUploaded = 'true';

            const section = slot.closest('.section');
            const group = slot.closest('.group-card');
            if (section) updateSectionCount(section);
            if (group) updateGroupPhotoCount(group);
        };

        const attachSlotEvents = (slot) => {
            const input = slot.querySelector("input[type='file']");
            const changeBtn = slot.querySelector("[data-action='change']");
            const removeBtn = slot.querySelector("[data-action='remove']");
            const imageArea = slot.querySelector('.slot-image-area');

            input.addEventListener('change', async (e) => {
                const [file] = e.target.files;
                await applyImageToSlot(slot, file);
            });

            changeBtn.addEventListener('click', () => input.click());

            removeBtn.addEventListener('click', () => {
                const section = slot.closest('.section');
                const group = slot.closest('.group-card');
                slot.remove();
                if (section) updateSectionCount(section);
                if (group) updateGroupPhotoCount(group);
            });

            ['dragenter', 'dragover'].forEach((evt) => {
                imageArea.addEventListener(evt, (e) => {
                    e.preventDefault();
                    if (!document.querySelector('.wrap').classList.contains('editing')) return;
                    slot.style.transform = 'translateY(-2px)';
                });
            });

            ['dragleave', 'drop'].forEach((evt) => {
                imageArea.addEventListener(evt, () => {
                    slot.style.transform = 'translateY(0)';
                });
            });

            imageArea.addEventListener('drop', async (e) => {
                e.preventDefault();
                if (!document.querySelector('.wrap').classList.contains('editing')) return;
                const [file] = e.dataTransfer.files;
                await applyImageToSlot(slot, file);
            });
        };

        const createPhotoSlot = (photoData = null) => {
            const src = typeof photoData === 'string' ? photoData
                      : photoData?.src || null;
            const memoText = typeof photoData === 'object' && photoData?.memo || '';

            slotCounter++;
            const slotId = `slot-${slotCounter}`;
            const fileName = src ? src.split('/').pop() : '';

            const slot = document.createElement('article');
            slot.className = 'photo-slot';
            slot.dataset.slot = slotId;

            if (src) {
                slot.classList.add('has-image');
                slot.dataset.srcPath = src;
            }

            slot.innerHTML = `
                <div class="slot-image-area">
                    <input type="file" accept="image/*" id="input-${slotId}" />
                    <img class="slot-preview" src="${src || ''}" alt="레퍼런스 이미지" />
                    <label class="slot-inner" for="input-${slotId}">
                        <div class="slot-icon">＋</div>
                        <div class="slot-title">사진 추가</div>
                        <div class="slot-sub">클릭 또는 드래그</div>
                    </label>
                    <div class="slot-overlay">
                        <div class="slot-name">${fileName}</div>
                        <div class="slot-actions">
                            <button type="button" class="mini-btn" data-action="change">변경</button>
                            <button type="button" class="mini-btn" data-action="remove">삭제</button>
                        </div>
                    </div>
                </div>
                <textarea class="slot-memo" rows="1" placeholder="사진 메모...">${memoText}</textarea>
            `;

            const slotMemo = slot.querySelector('.slot-memo');
            slotMemo.addEventListener('input', () => {
                slotMemo.style.height = 'auto';
                slotMemo.style.height = `${slotMemo.scrollHeight}px`;
            });

            attachSlotEvents(slot);
            return slot;
        };

        const createGroupCard = (sectionKey, groupData = {}) => {
            const card = document.createElement('div');
            card.className = 'group-card';
            card.dataset.sectionKey = sectionKey;

            const head = document.createElement('div');
            head.className = 'group-head';

            const titleInput = document.createElement('input');
            titleInput.type = 'text';
            titleInput.className = 'group-title-input';
            titleInput.value = groupData.title || '';
            titleInput.placeholder = '그룹 제목 입력...';

            const photoCount = document.createElement('span');
            photoCount.className = 'group-photo-count';
            photoCount.textContent = `${(groupData.photos || []).length}장`;

            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'group-delete-btn';
            deleteBtn.textContent = '삭제';
            deleteBtn.addEventListener('click', () => {
                if (!confirm('이 그룹을 삭제하시겠습니까?')) return;
                const section = card.closest('.section');
                card.remove();
                if (section) updateSectionCount(section);
            });

            head.appendChild(titleInput);
            head.appendChild(photoCount);
            head.appendChild(deleteBtn);
            card.appendChild(head);

            const body = document.createElement('div');
            body.className = 'group-body';

            const noteCard = document.createElement('div');
            noteCard.className = 'note-card';
            const memoLabel = document.createElement('h3');
            memoLabel.textContent = '구도 메모';
            noteCard.appendChild(memoLabel);

            const memo = document.createElement('textarea');
            memo.className = 'memo';
            memo.placeholder = '구도, 포즈, 분위기 등을 메모...';
            memo.value = groupData.memo || '';
            noteCard.appendChild(memo);
            body.appendChild(noteCard);

            const gallery = document.createElement('div');
            gallery.className = 'gallery';

            (groupData.photos || []).forEach((photoPath) => {
                gallery.appendChild(createPhotoSlot(photoPath));
            });

            const addSlotBtn = document.createElement('button');
            addSlotBtn.type = 'button';
            addSlotBtn.className = 'add-slot-btn';
            addSlotBtn.innerHTML = '<span class="add-slot-icon">＋</span><span>사진 추가</span>';
            addSlotBtn.addEventListener('click', () => {
                gallery.insertBefore(createPhotoSlot(), addSlotBtn);
            });
            gallery.appendChild(addSlotBtn);

            body.appendChild(gallery);
            card.appendChild(body);

            return card;
        };

        const createSection = (sectionData) => {
            const section = document.createElement('section');
            section.className = 'section';
            section.dataset.key = sectionData.key;

            const head = document.createElement('div');
            head.className = 'section-head';
            head.innerHTML = `
                <div class="section-title-wrap">
                    <h2>${sectionData.title}</h2>
                    <p>${sectionData.description}</p>
                </div>
                <div class="section-count">0 Photos</div>
            `;
            section.appendChild(head);

            const groupsContainer = document.createElement('div');
            groupsContainer.className = 'section-groups';

            (sectionData.groups || []).forEach((group) => {
                groupsContainer.appendChild(createGroupCard(sectionData.key, group));
            });

            const addGroupBtn = document.createElement('button');
            addGroupBtn.type = 'button';
            addGroupBtn.className = 'add-group-btn';
            addGroupBtn.innerHTML = '<span class="add-group-icon">＋</span><span>그룹 추가</span>';
            addGroupBtn.addEventListener('click', () => {
                const card = createGroupCard(sectionData.key);
                groupsContainer.insertBefore(card, addGroupBtn);
                card.querySelector('.group-title-input').focus();
            });
            groupsContainer.appendChild(addGroupBtn);

            section.appendChild(groupsContainer);
            updateSectionCount(section);

            return section;
        };

        const renderBoard = (data) => {
            const board = document.getElementById('board');
            board.innerHTML = '';
            data.sections.forEach((sectionData) => {
                board.appendChild(createSection(sectionData));
            });
        };

        /* Lightbox */
        const closeLightbox = () => {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        };

        const openLightbox = (slot) => {
            const preview = slot.querySelector('.slot-preview');
            const slotMemo = slot.querySelector('.slot-memo')?.value.trim() || '';
            const groupCard = slot.closest('.group-card');
            const groupTitle = groupCard?.querySelector('.group-title-input')?.value || '';

            document.getElementById('lightboxImg').src = preview.src;

            const memoEl = document.getElementById('lightboxMemo');
            const displayParts = [groupTitle, slotMemo].filter(Boolean);
            if (displayParts.length) {
                memoEl.textContent = displayParts.join(' — ');
                memoEl.style.display = 'block';
            } else {
                memoEl.style.display = 'none';
            }

            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        const setupLightbox = () => {
            const lightbox = document.getElementById('lightbox');

            lightbox.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeLightbox();
                    closeJsonModal();
                }
            });

            const tryOpenLightbox = (e) => {
                const imageArea = e.target.closest('.slot-image-area');
                if (!imageArea) return false;
                if (e.target.closest('.slot-overlay') || e.target.closest('.slot-inner')) return false;
                const slot = imageArea.closest('.photo-slot');
                if (!slot || !slot.classList.contains('has-image')) return false;
                openLightbox(slot);
                return true;
            };

            let touchStart = null;
            document.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                touchStart = { x: touch.clientX, y: touch.clientY };
            }, { passive: true });

            document.addEventListener('touchend', (e) => {
                if (!touchStart) return;
                const touch = e.changedTouches[0];
                const dx = Math.abs(touch.clientX - touchStart.x);
                const dy = Math.abs(touch.clientY - touchStart.y);
                touchStart = null;
                if (dx > 10 || dy > 10) return;
                if (!tryOpenLightbox(e)) return;
                e.preventDefault();
            }, { passive: false });

            document.addEventListener('click', (e) => {
                if ('ontouchstart' in window) return;
                tryOpenLightbox(e);
            });
        };

        /* Edit Toggle */
        const setupEditToggle = () => {
            const wrap = document.querySelector('.wrap');
            const btn = document.getElementById('editToggleBtn');

            btn.addEventListener('click', () => {
                const isEditing = wrap.classList.toggle('editing');
                btn.textContent = isEditing ? '편집 완료' : '편집';
                btn.classList.toggle('active', isEditing);
            });
        };

        /* JSON Export */
        const collectData = () => {
            const sections = [];
            document.querySelectorAll('.section').forEach((sectionEl) => {
                const key = sectionEl.dataset.key;
                const title = sectionEl.querySelector('.section-title-wrap h2').textContent;
                const description = sectionEl.querySelector('.section-title-wrap p').textContent;

                const groups = [];
                sectionEl.querySelectorAll('.group-card').forEach((groupEl) => {
                    const groupTitle = groupEl.querySelector('.group-title-input').value.trim();
                    const memo = groupEl.querySelector('.memo').value.trim();

                    const photos = [];
                    groupEl.querySelectorAll('.photo-slot.has-image').forEach((slot) => {
                        const slotMemo = slot.querySelector('.slot-memo')?.value.trim() || '';
                        let src = '';
                        if (slot.dataset.srcPath) {
                            src = slot.dataset.srcPath;
                        } else if (slot.dataset.isUploaded === 'true') {
                            const fileName = slot.dataset.originalName || 'photo.jpg';
                            const safeGroup = groupTitle || 'unnamed';
                            src = `images/${key}/${safeGroup}/${fileName}`;
                        }
                        photos.push(slotMemo ? { src, memo: slotMemo } : src);
                    });

                    groups.push({ title: groupTitle, memo, photos });
                });

                sections.push({ key, title, description, groups });
            });

            return { sections };
        };

        const closeJsonModal = () => {
            document.getElementById('jsonModal').classList.remove('active');
        };

        const setupJsonExport = () => {
            const modal = document.getElementById('jsonModal');
            const output = document.getElementById('jsonOutput');
            const copyBtn = document.getElementById('copyJsonBtn');

            document.getElementById('exportJsonBtn').addEventListener('click', () => {
                const data = collectData();
                output.value = JSON.stringify(data, null, 2);
                modal.classList.add('active');
            });

            modal.querySelector('.modal-close').addEventListener('click', closeJsonModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeJsonModal();
            });

            copyBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(output.value);
                } catch {
                    output.select();
                    document.execCommand('copy');
                }
                copyBtn.textContent = '복사 완료!';
                setTimeout(() => { copyBtn.textContent = '클립보드에 복사'; }, 1500);
            });
        };

        /* Init */
        const init = async () => {
            const data = await loadData();
            renderBoard(data);
            setupLightbox();
            setupEditToggle();
            setupJsonExport();
        };

        init();
    </script>
</body>
</html>
