<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Photo Reference Board</title>
    <style>
        :root {
            --bg: #f6f3ef;
            --paper: #ffffff;
            --ink: #222222;
            --muted: #7a7a7a;
            --line: #e6dfd8;
            --accent: #b6937a;
            --accent-soft: #efe6df;
            --shadow: 0 18px 40px rgba(35, 25, 20, 0.08);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 34%),
                linear-gradient(180deg, #fbf8f4 0%, #f2ede8 100%);
        }

        .wrap {
            width: min(1280px, calc(100% - 48px));
            margin: 48px auto 72px;
        }

        .hero {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-xl);
            padding: 40px 42px;
            box-shadow: var(--shadow);
            margin-bottom: 28px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #7f5f4a;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 10px;
            font-size: clamp(32px, 4vw, 52px);
            line-height: 1.08;
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.7;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .toolbar button,
        .toolbar label {
            appearance: none;
            border: none;
            cursor: pointer;
            border-radius: 999px;
            padding: 13px 18px;
            font-size: 14px;
            font-weight: 700;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .toolbar button:hover,
        .toolbar label:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--ink);
            color: white;
            box-shadow: 0 10px 24px rgba(34, 34, 34, 0.12);
        }

        .btn-soft {
            background: white;
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .file-input {
            display: none;
        }

        .board {
            display: grid;
            gap: 20px;
        }

        .section {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            padding: 28px 30px 20px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(249,245,241,0.85) 100%);
        }

        .section-title-wrap h2 {
            margin: 0;
            font-size: 26px;
            letter-spacing: -0.03em;
        }

        .section-title-wrap p {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .section-count {
            padding: 9px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #7f5f4a;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .section-body {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 20px;
            padding: 24px;
        }

        .note-card {
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, #fffdfa 0%, #faf6f1 100%);
        }

        .note-card h3 {
            margin: 0 0 14px;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        .memo {
            width: 100%;
            min-height: 188px;
            resize: vertical;
            border: 1px solid #dfd7cf;
            border-radius: var(--radius-md);
            background: white;
            padding: 16px;
            font: inherit;
            font-size: 14px;
            line-height: 1.65;
            color: var(--ink);
            outline: none;
        }

        .memo:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(182, 147, 122, 0.12);
        }

        .chip-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 8px 10px;
            border-radius: 999px;
            background: white;
            border: 1px solid var(--line);
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }

        .chip-delete {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.15);
            color: white;
            font-size: 9px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            flex-shrink: 0;
        }

        .chip-delete:hover {
            background: rgba(0, 0, 0, 0.35);
        }

        .chip-add-wrap {
            display: inline-flex;
        }

        .chip-add-input {
            border: 1px dashed var(--line);
            border-radius: 999px;
            padding: 7px 10px;
            font: inherit;
            font-size: 12px;
            color: var(--ink);
            background: white;
            outline: none;
            width: 100px;
        }

        .chip-add-input::placeholder {
            color: var(--muted);
            opacity: 0.5;
        }

        .chip-add-input:focus {
            border-color: var(--accent);
            border-style: solid;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .photo-slot {
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--line);
            isolation: isolate;
        }

        .slot-image-area {
            position: relative;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.98), rgba(247,240,235,0.92)),
                repeating-linear-gradient(
                    -45deg,
                    rgba(182, 147, 122, 0.08) 0,
                    rgba(182, 147, 122, 0.08) 12px,
                    rgba(255, 255, 255, 0.8) 12px,
                    rgba(255, 255, 255, 0.8) 24px
                );
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .photo-slot.has-image .slot-inner {
            display: none;
        }

        .photo-slot input {
            display: none;
        }

        .slot-inner {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            transition: background 0.18s ease, transform 0.18s ease;
        }

        .photo-slot:hover .slot-inner {
            background: rgba(255, 255, 255, 0.34);
        }

        .slot-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 10px 20px rgba(52, 34, 19, 0.08);
            font-size: 22px;
        }

        .slot-title {
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.02em;
        }

        .slot-sub {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .photo-slot.has-image .slot-overlay {
            opacity: 1;
        }

        .slot-preview {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-slot.has-image .slot-preview {
            display: block;
        }

        .slot-overlay {
            position: absolute;
            inset: auto 12px 12px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 14px;
            color: white;
            background: linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.56));
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.18s ease;
        }

        .photo-slot:hover .slot-overlay {
            opacity: 1;
        }

        .slot-name {
            font-size: 12px;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .slot-actions {
            display: flex;
            gap: 8px;
        }

        .mini-btn {
            border: none;
            cursor: pointer;
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
        }

        .mini-btn:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .slot-memo {
            display: block;
            width: 100%;
            border: none;
            border-top: 1px solid var(--line);
            padding: 8px 12px;
            font: inherit;
            font-size: 12px;
            line-height: 1.5;
            color: var(--ink);
            background: white;
            resize: none;
            outline: none;
        }

        .slot-memo:focus {
            background: #fffaf6;
        }

        .slot-memo::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(16px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            cursor: pointer;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            cursor: default;
        }

        .lightbox-memo {
            max-width: 600px;
            margin: 0;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            line-height: 1.6;
            text-align: center;
            cursor: default;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: background 0.18s ease;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.24);
        }

        .add-slot-btn {
            aspect-ratio: 4 / 5;
            border-radius: 18px;
            border: 2px dashed var(--line);
            background: transparent;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
        }

        .add-slot-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(182, 147, 122, 0.04);
        }

        .add-slot-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: var(--accent-soft);
            font-size: 20px;
            color: var(--accent);
        }

        .wrap:not(.editing) .photo-slot:not(.has-image) {
            display: none;
        }

        .wrap:not(.editing) .photo-slot .slot-inner {
            display: none;
        }

        .wrap:not(.editing) .photo-slot .slot-overlay {
            display: none;
        }

        .wrap:not(.editing) .add-slot-btn {
            display: none;
        }

        .wrap:not(.editing) .chip-delete {
            display: none;
        }

        .wrap:not(.editing) .chip-add-wrap {
            display: none;
        }

        #editToggleBtn.active {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
            box-shadow: 0 10px 24px rgba(34, 34, 34, 0.12);
        }

        @media (max-width: 1080px) {
            .section-body {
                grid-template-columns: 1fr;
            }

            .gallery {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .wrap {
                width: min(100% - 24px, 1280px);
                margin: 18px auto 36px;
            }

            .hero {
                padding: 24px 20px;
            }

            .section-head {
                padding: 22px 20px 16px;
            }

            .section-body {
                padding: 18px;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .lightbox {
                padding: 16px;
            }
        }

        @media print {
            body {
                background: white;
            }

            .wrap {
                width: 100%;
                margin: 0;
            }

            .hero,
            .section {
                box-shadow: none;
                border: 1px solid #ddd;
                break-inside: avoid;
            }

            .toolbar,
            .mini-btn,
            .slot-sub,
            .slot-inner,
            .slot-overlay,
            .lightbox,
            .add-slot-btn,
            .chip-delete,
            .chip-add-wrap,
            .photo-slot:not(.has-image) {
                display: none !important;
            }

            .slot-memo:empty,
            .slot-memo:placeholder-shown {
                display: none !important;
            }

            .board {
                gap: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="hero">
            <span class="eyebrow">Wedding Reference Board</span>
            <h1>웨딩 촬영 시안</h1>
            <div class="toolbar">
                <button type="button" class="btn-primary" onclick="window.print()">PDF / 인쇄 저장</button>
                <button type="button" class="btn-soft" id="editToggleBtn">편집</button>
                <button type="button" class="btn-soft" id="exportHtmlBtn">HTML로 저장</button>
            </div>
        </section>

        <main class="board">
            <section class="section">
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2>투샷</h2>
                        <p>커플 중심의 메인 구도와 분위기 레퍼런스</p>
                    </div>
                    <div class="section-count">0 Photos</div>
                </div>
                <div class="section-body">
                    <aside class="note-card">
                        <h3>구도 메모</h3>
                        <textarea class="memo" placeholder="예시&#10;- 정면보다 자연스럽게 시선 교차&#10;- 서서 마주보기 / 걷는 컷 / 뒤에서 안는 컷&#10;- 과한 포즈보다 자연스러운 분위기"></textarea>
                        <div class="chip-list">
                            <span class="chip">서서 마주보기</span>
                            <span class="chip">걷는 컷</span>
                            <span class="chip">뒤에서 안기</span>
                            <span class="chip">자연스러운 스냅</span>
                        </div>
                    </aside>
                    <div class="gallery" data-group="couple"></div>
                </div>
            </section>

            <section class="section">
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2>신부 단독컷</h2>
                        <p>드레스 라인, 시선 처리, 손동작 중심 레퍼런스</p>
                    </div>
                    <div class="section-count">0 Photos</div>
                </div>
                <div class="section-body">
                    <aside class="note-card">
                        <h3>구도 메모</h3>
                        <textarea class="memo" placeholder="예시&#10;- 드레스 실루엣이 잘 보이게&#10;- 측면 / 반측면 / 시선 내린 컷&#10;- 부케 활용 컷 위주"></textarea>
                        <div class="chip-list">
                            <span class="chip">측면 포즈</span>
                            <span class="chip">시선 내리기</span>
                            <span class="chip">부케 컷</span>
                            <span class="chip">드레스 라인 강조</span>
                        </div>
                    </aside>
                    <div class="gallery" data-group="bride"></div>
                </div>
            </section>

            <section class="section">
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2>신랑 단독컷</h2>
                        <p>턱시도 핏, 담백한 포즈, 클래식 무드 중심 레퍼런스</p>
                    </div>
                    <div class="section-count">0 Photos</div>
                </div>
                <div class="section-body">
                    <aside class="note-card">
                        <h3>구도 메모</h3>
                        <textarea class="memo" placeholder="예시&#10;- 과한 연출보다 담백하고 단정하게&#10;- 자켓 여미는 컷 / 앉는 컷 / 측면 컷&#10;- 시선은 정면 또는 살짝 옆"></textarea>
                        <div class="chip-list">
                            <span class="chip">정면 스탠딩</span>
                            <span class="chip">자켓 정리</span>
                            <span class="chip">앉는 컷</span>
                            <span class="chip">클래식 무드</span>
                        </div>
                    </aside>
                    <div class="gallery" data-group="groom"></div>
                </div>
            </section>
        </main>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" type="button">&times;</button>
        <img class="lightbox-img" id="lightboxImg" alt="" />
        <p class="lightbox-memo" id="lightboxMemo"></p>
    </div>

    <script>
        const sectionConfigs = [
            { key: "couple", title: "투샷" },
            { key: "bride", title: "신부 단독" },
            { key: "groom", title: "신랑 단독" }
        ];

        const slotCounters = {};

        const updateSectionCount = (section) => {
            const count = section.querySelectorAll(".photo-slot.has-image").length;
            section.querySelector(".section-count").textContent = `${count} Photos`;
        };

        const createSlotMarkup = (groupKey, index, title) => {
            const slotId = `${groupKey}-${index}`;

            return `
                <article class="photo-slot" data-slot="${slotId}">
                    <div class="slot-image-area">
                        <input type="file" accept="image/*" id="input-${slotId}" />
                        <img class="slot-preview" alt="${title} 참고 이미지" />
                        <label class="slot-inner" for="input-${slotId}">
                            <div class="slot-icon">＋</div>
                            <div class="slot-title">${title}</div>
                            <div class="slot-sub">클릭해서 사진 추가<br />또는 이미지를 드래그해서 올리기</div>
                        </label>
                        <div class="slot-overlay">
                            <div class="slot-name">이미지 없음</div>
                            <div class="slot-actions">
                                <button type="button" class="mini-btn" data-action="change">변경</button>
                                <button type="button" class="mini-btn" data-action="remove">삭제</button>
                            </div>
                        </div>
                    </div>
                    <textarea class="slot-memo" rows="1" placeholder="메모..."></textarea>
                </article>
            `;
        };

        const addSlotToGallery = (gallery, key, title) => {
            if (!slotCounters[key]) slotCounters[key] = 0;
            slotCounters[key] += 1;
            const index = slotCounters[key];

            const temp = document.createElement("div");
            temp.innerHTML = createSlotMarkup(key, index, `${title} 레퍼런스 ${index}`).trim();
            const slot = temp.firstElementChild;

            gallery.insertBefore(slot, gallery.querySelector(".add-slot-btn"));
            attachSingleSlotEvents(slot);
        };

        const buildGalleries = () => {
            sectionConfigs.forEach(({ key, title }) => {
                const gallery = document.querySelector(`.gallery[data-group="${key}"]`);

                const addBtn = document.createElement("button");
                addBtn.type = "button";
                addBtn.className = "add-slot-btn";
                addBtn.innerHTML = `<span class="add-slot-icon">＋</span><span>사진 추가</span>`;
                addBtn.addEventListener("click", () => addSlotToGallery(gallery, key, title));
                gallery.appendChild(addBtn);

                updateSectionCount(gallery.closest(".section"));
            });
        };

        const readFileAsDataUrl = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });

        const applyImageToSlot = async (slot, file) => {
            if (!file || !file.type.startsWith("image/")) return;

            const preview = slot.querySelector(".slot-preview");
            const overlayName = slot.querySelector(".slot-name");
            const dataUrl = await readFileAsDataUrl(file);

            preview.src = dataUrl;
            overlayName.textContent = file.name;
            slot.classList.add("has-image");
            updateSectionCount(slot.closest(".section"));
        };

        const attachSingleSlotEvents = (slot) => {
            const input = slot.querySelector("input[type='file']");
            const changeBtn = slot.querySelector("[data-action='change']");
            const removeBtn = slot.querySelector("[data-action='remove']");
            const imageArea = slot.querySelector(".slot-image-area");
            const memo = slot.querySelector(".slot-memo");

            input.addEventListener("change", async (event) => {
                const [file] = event.target.files;
                await applyImageToSlot(slot, file);
            });

            changeBtn.addEventListener("click", () => input.click());

            removeBtn.addEventListener("click", () => {
                const section = slot.closest(".section");
                slot.remove();
                updateSectionCount(section);
            });

            memo.addEventListener("input", () => {
                memo.style.height = "auto";
                memo.style.height = `${memo.scrollHeight}px`;
            });

            ["dragenter", "dragover"].forEach((eventName) => {
                imageArea.addEventListener(eventName, (event) => {
                    event.preventDefault();
                    if (!document.querySelector(".wrap").classList.contains("editing")) return;
                    slot.style.transform = "translateY(-2px)";
                });
            });

            ["dragleave", "drop"].forEach((eventName) => {
                imageArea.addEventListener(eventName, () => {
                    slot.style.transform = "translateY(0)";
                });
            });

            imageArea.addEventListener("drop", async (event) => {
                event.preventDefault();
                if (!document.querySelector(".wrap").classList.contains("editing")) return;
                const [file] = event.dataTransfer.files;
                await applyImageToSlot(slot, file);
            });
        };

        const openLightbox = (slot) => {
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightboxImg");
            const lightboxMemo = document.getElementById("lightboxMemo");
            const preview = slot.querySelector(".slot-preview");
            const memo = slot.querySelector(".slot-memo");

            lightboxImg.src = preview.src;
            lightboxImg.alt = preview.alt;

            if (memo && memo.value.trim()) {
                lightboxMemo.textContent = memo.value;
                lightboxMemo.style.display = "block";
            } else {
                lightboxMemo.style.display = "none";
            }

            lightbox.classList.add("active");
            document.body.style.overflow = "hidden";
        };

        const closeLightbox = () => {
            const lightbox = document.getElementById("lightbox");
            lightbox.classList.remove("active");
            document.body.style.overflow = "";
        };

        const setupLightbox = () => {
            const lightbox = document.getElementById("lightbox");

            lightbox.querySelector(".lightbox-close").addEventListener("click", closeLightbox);
            lightbox.addEventListener("click", (e) => {
                if (e.target === lightbox) closeLightbox();
            });
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeLightbox();
            });

            const tryOpenLightbox = (e) => {
                const target = e.target;
                const imageArea = target.closest(".slot-image-area");
                if (!imageArea) return false;
                if (target.closest(".slot-overlay") || target.closest(".slot-inner")) return false;
                const slot = imageArea.closest(".photo-slot");
                if (!slot || !slot.classList.contains("has-image")) return false;
                openLightbox(slot);
                return true;
            };

            document.addEventListener("click", (e) => {
                tryOpenLightbox(e);
            });

            document.addEventListener("touchend", (e) => {
                if (!tryOpenLightbox(e)) return;
                e.preventDefault();
            }, { passive: false });
        };

        const setupEditToggle = () => {
            const wrap = document.querySelector(".wrap");
            const btn = document.getElementById("editToggleBtn");

            btn.addEventListener("click", () => {
                const isEditing = wrap.classList.toggle("editing");
                btn.textContent = isEditing ? "편집 완료" : "편집";
                btn.classList.toggle("active", isEditing);
            });
        };

        const setupChipEditing = () => {
            document.querySelectorAll(".chip-list").forEach((chipList) => {
                chipList.querySelectorAll(".chip").forEach((chip) => {
                    const deleteBtn = document.createElement("button");
                    deleteBtn.type = "button";
                    deleteBtn.className = "chip-delete";
                    deleteBtn.textContent = "×";
                    deleteBtn.addEventListener("click", () => chip.remove());
                    chip.appendChild(deleteBtn);
                });

                const addWrap = document.createElement("div");
                addWrap.className = "chip-add-wrap";
                const input = document.createElement("input");
                input.type = "text";
                input.className = "chip-add-input";
                input.placeholder = "태그 추가…";
                input.addEventListener("keydown", (e) => {
                    if (e.key !== "Enter" || !input.value.trim()) return;
                    e.preventDefault();

                    const chip = document.createElement("span");
                    chip.className = "chip";
                    chip.textContent = input.value.trim();

                    const deleteBtn = document.createElement("button");
                    deleteBtn.type = "button";
                    deleteBtn.className = "chip-delete";
                    deleteBtn.textContent = "×";
                    deleteBtn.addEventListener("click", () => chip.remove());
                    chip.appendChild(deleteBtn);

                    chipList.insertBefore(chip, addWrap);
                    input.value = "";
                });
                addWrap.appendChild(input);
                chipList.appendChild(addWrap);
            });
        };

        const exportAsHtml = () => {
            const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

            const baseCss = document.querySelector("style").textContent;
            const extraCss = "\ndiv.slot-memo{white-space:pre-wrap}\n"
                + ".memo-display{width:100%;padding:16px;border:1px solid #dfd7cf;border-radius:14px;background:#fff;font-size:14px;line-height:1.65;color:#222;white-space:pre-wrap}\n"
                + ".memo-display:empty{display:none}\n";

            let sectionsHtml = "";
            document.querySelectorAll(".section").forEach((section) => {
                const title = section.querySelector(".section-title-wrap h2")?.textContent || "";
                const desc = section.querySelector(".section-title-wrap p")?.textContent || "";
                const memoText = section.querySelector(".memo")?.value.trim() || "";
                const chips = Array.from(section.querySelectorAll(".chip")).map((c) => {
                    const clone = c.cloneNode(true);
                    clone.querySelectorAll(".chip-delete").forEach((b) => b.remove());
                    return clone.textContent.trim();
                });
                const slots = section.querySelectorAll(".photo-slot.has-image");

                let photosHtml = "";
                slots.forEach((slot) => {
                    const src = slot.querySelector(".slot-preview").src;
                    const alt = slot.querySelector(".slot-preview").alt || "";
                    const memo = slot.querySelector(".slot-memo").value.trim();
                    photosHtml += '<article class="photo-slot has-image"><div class="slot-image-area">'
                        + '<img class="slot-preview" src="' + src + '" alt="' + esc(alt) + '" />'
                        + '</div>'
                        + (memo ? '<div class="slot-memo">' + esc(memo) + '</div>' : '')
                        + '</article>';
                });

                const chipsHtml = chips.map((c) => '<span class="chip">' + esc(c) + '</span>').join("");
                const memoHtml = memoText
                    ? '<div class="memo-display">' + esc(memoText).replace(/\n/g, "<br>") + '</div>'
                    : '';

                sectionsHtml += '<section class="section"><div class="section-head">'
                    + '<div class="section-title-wrap"><h2>' + esc(title) + '</h2><p>' + esc(desc) + '</p></div>'
                    + '<div class="section-count">' + slots.length + ' Photos</div></div>'
                    + '<div class="section-body"><aside class="note-card"><h3>구도 메모</h3>'
                    + memoHtml
                    + (chipsHtml ? '<div class="chip-list">' + chipsHtml + '</div>' : '')
                    + '</aside><div class="gallery">' + photosHtml + '</div></div></section>';
            });

            const exportJs = [
                'document.addEventListener("click",function(e){',
                '  var a=e.target.closest(".slot-image-area");if(!a)return;',
                '  var s=a.closest(".photo-slot");if(!s)return;',
                '  var im=s.querySelector(".slot-preview");if(!im||!im.src)return;',
                '  var lb=document.getElementById("lb"),li=document.getElementById("lbImg"),lm=document.getElementById("lbMemo");',
                '  var m=s.querySelector(".slot-memo");',
                '  li.src=im.src;',
                '  if(m&&m.textContent.trim()){lm.textContent=m.textContent;lm.style.display="block"}',
                '  else{lm.style.display="none"}',
                '  lb.classList.add("active");document.body.style.overflow="hidden"',
                '});',
                'var closeLb=function(){document.getElementById("lb").classList.remove("active");document.body.style.overflow=""};',
                'document.querySelector(".lightbox-close").addEventListener("click",closeLb);',
                'document.getElementById("lb").addEventListener("click",function(e){if(e.target===this)closeLb()});',
                'document.addEventListener("keydown",function(e){if(e.key==="Escape")closeLb()});'
            ].join("\n");

            const htmlParts = [
                '<!DOCTYPE html>',
                '<html lang="ko">',
                '<head>',
                '<meta charset="UTF-8" />',
                '<meta name="viewport" content="width=device-width, initial-scale=1.0" />',
                '<title>웨딩 촬영 시안</title>',
                '<style>' + baseCss + extraCss + '</style>',
                '</head>',
                '<body>',
                '<div class="wrap">',
                '<section class="hero"><span class="eyebrow">Wedding Reference Board</span><h1>웨딩 촬영 시안</h1></section>',
                '<main class="board">' + sectionsHtml + '</main>',
                '</div>',
                '<div class="lightbox" id="lb"><button class="lightbox-close" type="button">&times;</button><img class="lightbox-img" id="lbImg" alt="" /><p class="lightbox-memo" id="lbMemo"></p></div>',
                '<script>' + exportJs + '<' + '/script>',
                '</body>',
                '</html>'
            ];

            const blob = new Blob([htmlParts.join("\n")], { type: "text/html;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "웨딩촬영시안.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        buildGalleries();
        setupLightbox();
        setupEditToggle();
        setupChipEditing();
        document.getElementById("exportHtmlBtn").addEventListener("click", exportAsHtml);
    </script>
</body>
</html>
